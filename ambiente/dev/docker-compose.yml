services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: afc_local
      POSTGRES_USER: afc
      POSTGRES_PASSWORD: afc
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afc"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
