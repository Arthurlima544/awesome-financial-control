# ── Database ──────────────────────────────────────────────────────────────────
# DataSourceConfig bean reads DATABASE_URL (postgres://... format) from Railway
# and converts it to a HikariCP datasource — no other DB vars needed.
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Flyway ────────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized

# ── OpenAPI ───────────────────────────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.org.springframework=WARN
logging.level.com.awesome.financial.control=INFO

# ── Brapi ─────────────────────────────────────────────────────────────────────
brapi.token=${BRAPI_TOKEN:demo20}