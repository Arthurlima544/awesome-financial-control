services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-afc_local}
      POSTGRES_USER: ${POSTGRES_USER:-afc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-afc}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-afc}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-afc_local}
      DB_USERNAME: ${POSTGRES_USER:-afc}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-afc}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
