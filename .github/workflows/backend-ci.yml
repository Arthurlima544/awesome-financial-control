name: Backend CI

on:
  push:
    branches: [main, sprint-*]
    paths: ["backend/**"]
  pull_request:
    branches: [main]
    paths: ["backend/**"]
  workflow_dispatch:
    inputs:
      deploy_env:
        description: "Deploy to environment"
        required: true
        default: staging
        type: choice
        options: [staging, production]

jobs:
  quality:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: afc_test
          POSTGRES_USER: ${{ secrets.CI_DB_USERNAME }}
          POSTGRES_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Spotless check
        run: ./mvnw spotless:check -q

      - name: Test
        run: ./mvnw test -q
        env:
          SPRING_PROFILES_ACTIVE: local
          DB_URL: jdbc:postgresql://localhost:5432/afc_test
          DB_USERNAME: ${{ secrets.CI_DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}

      - name: Build
        run: ./mvnw clean package -DskipTests -q

      - name: SonarQube analysis
        if: ${{ secrets.SONAR_TOKEN != '' }}
        run: ./mvnw sonar:sonar -q
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  deploy-staging:
    name: Deploy to Railway (Staging)
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to staging
        run: railway up --environment staging --service api --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}

  deploy-production:
    name: Deploy to Railway (Production)
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_env == 'production'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to production
        run: railway up --environment production --service api --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_PROD }}
