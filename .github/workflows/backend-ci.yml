name: Backend CI

on:
  push:
    branches: [main, sprint-*]
    paths: ["backend/**"]
  pull_request:
    branches: [main]
    paths: ["backend/**"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to deploy (e.g. v1.0.0)"
        required: true
        type: string
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [staging, production]

jobs:
  quality:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: afc_test
          POSTGRES_USER: ${{ secrets.CI_DB_USERNAME }}
          POSTGRES_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version || github.sha }}

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Spotless check
        run: ./mvnw spotless:check -q

      - name: Test
        run: ./mvnw test -q
        env:
          SPRING_PROFILES_ACTIVE: local
          DB_URL: jdbc:postgresql://localhost:5432/afc_test
          DB_USERNAME: ${{ secrets.CI_DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}

      - name: Build
        run: ./mvnw clean package -DskipTests -q

      - name: SonarQube analysis
        if: env.SONAR_TOKEN != ''
        run: ./mvnw sonar:sonar -q
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  deploy:
    name: Deploy to Railway (${{ github.event.inputs.environment }})
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'workflow_dispatch'
    environment: ${{ github.event.inputs.environment }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version }}

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to ${{ github.event.inputs.environment }}
        run: railway up --environment ${{ github.event.inputs.environment }} --service api --detach
        env:
          RAILWAY_TOKEN: ${{ github.event.inputs.environment == 'production' && secrets.RAILWAY_TOKEN_PROD || secrets.RAILWAY_TOKEN_STAGING }}
