name: Update Golden Files

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to update goldens on (default: main)"
        required: false
        default: main
        type: string

jobs:
  update-goldens:
    name: Regenerate golden files on Linux
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Regenerate golden files
        working-directory: mobile
        run: flutter test --update-goldens

      - name: Commit updated goldens
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mobile/test/**/goldens/
          git diff --staged --quiet || git commit -m "(US-S0-06) @Arthurlima544 test: regenerate golden files on Linux"
          git push
