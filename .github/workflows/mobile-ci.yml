name: Mobile CI

on:
  push:
    branches: [main]
    paths: ["mobile/**"]
  pull_request:
    branches: [main]
    paths: ["mobile/**"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to deploy (e.g. v1.0.3)"
        required: true
        type: string

jobs:
  quality:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version || github.sha }}

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Format check
        run: dart format --set-exit-if-changed .

      - name: Test
        run: flutter test

  deploy-internal:
    name: Deploy to Play Store (Internal Testing)
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'workflow_dispatch'
    environment: staging

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version }}

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode \
            > mobile/android/app/keystore.jks

      - name: Create key.properties
        run: |
          cat > mobile/android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=keystore.jks
          EOF

      - name: Resolve version numbers
        id: version
        run: |
          TAG="${{ github.event.inputs.version }}"
          BUILD_NAME="${TAG#v}"
          IFS='.' read -ra parts <<< "$BUILD_NAME"
          BUILD_NUMBER=$(( parts[0] * 10000 + parts[1] * 100 + parts[2] ))
          echo "build_name=$BUILD_NAME" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT

      - name: Get dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Build release AAB
        working-directory: mobile
        run: |
          flutter build appbundle --release \
            --build-name=${{ steps.version.outputs.build_name }} \
            --build-number=${{ steps.version.outputs.build_number }} \
            --dart-define=FLAVOR=staging \
            --dart-define=API_BASE_URL=${{ secrets.STAGING_API_URL }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-aab-${{ github.event.inputs.version }}
          path: mobile/build/app/outputs/bundle/release/app-release.aab
          retention-days: 7

      - name: Upload to Play Store internal track
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_JSON_KEY }}
          packageName: com.awesome.financial.control.afc
          releaseFiles: mobile/build/app/outputs/bundle/release/app-release.aab
          track: internal
          releaseName: ${{ github.event.inputs.version }}
          status: completed
