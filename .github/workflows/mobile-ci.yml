name: Mobile CI

on:
  push:
    branches: [main, sprint-*]
    paths: ["mobile/**"]
  pull_request:
    branches: [main]
    paths: ["mobile/**"]

jobs:
  quality:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Format check
        run: dart format --set-exit-if-changed .

      - name: Test
        run: flutter test

  build-web-staging:
    name: Build Web (Staging)
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build web
        run: |
          flutter build web \
            --dart-define=FLAVOR=staging \
            --dart-define=API_BASE_URL=${{ secrets.STAGING_API_URL }}

  build-android-staging:
    name: Build Android AAB (Staging)
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode \
            > mobile/android/app/keystore.jks

      - name: Create key.properties
        run: |
          cat > mobile/android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=app/keystore.jks
          EOF

      - name: Get dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Build release AAB (staging)
        working-directory: mobile
        run: |
          flutter build appbundle --release \
            --dart-define=FLAVOR=staging \
            --dart-define=API_BASE_URL=${{ secrets.STAGING_API_URL }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: staging-release-aab
          path: mobile/build/app/outputs/bundle/release/app-release.aab
          retention-days: 7

  build-android-production:
    name: Build Android AAB (Production)
    runs-on: ubuntu-latest
    needs: quality
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode \
            > mobile/android/app/keystore.jks

      - name: Create key.properties
        run: |
          cat > mobile/android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=app/keystore.jks
          EOF

      - name: Get dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Build release AAB (production)
        working-directory: mobile
        run: |
          flutter build appbundle --release \
            --dart-define=FLAVOR=prod \
            --dart-define=API_BASE_URL=${{ secrets.PROD_API_URL }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-release-aab-${{ github.ref_name }}
          path: mobile/build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
